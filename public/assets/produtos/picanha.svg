<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="meatGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="50%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="fatGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="100%" stop-color="#f5efe0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#fdfdfd" stroke="#f1f1ee" stroke-width="2"/>
  <!-- Wooden cutting board background shadow -->
  <ellipse cx="100" cy="130" rx="75" ry="30" fill="#232b28" fill-opacity="0.05"/>
  <!-- Meat Shape -->
  <path d="M40 90 Q40 60 80 50 Q110 45 140 60 Q170 80 160 120 Q150 145 110 150 Q70 155 50 130 Q35 110 40 90 Z" fill="url(#meatGrad)" stroke="#581c1c" stroke-width="2"/>
  <!-- Layer of Fat -->
  <path d="M40 90 Q40 60 80 50 Q110 45 140 60 C130 65 110 65 95 70 C75 76 55 85 40 90 Z" fill="url(#fatGrad)" stroke="#dcd3c1" stroke-width="1.5"/>
  <!-- Marbling lines (veteado) -->
  <path d="M70 100 Q80 90 95 105" fill="none" stroke="#fefefb" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M90 120 Q105 110 115 125" fill="none" stroke="#fefefb" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M120 90 Q130 80 145 95" fill="none" stroke="#fefefb" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M60 120 Q70 115 80 125" fill="none" stroke="#fefefb" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Rosemary sprig for presentation -->
  <path d="M130 140 L160 110" fill="none" stroke="#3f6212" stroke-width="3" stroke-linecap="round"/>
  <!-- Branding tag icon -->
  <rect x="75" y="15" width="50" height="20" rx="3" fill="#dc2626"/>
  <text x="100" y="29" fill="#ffffff" font-family="Montserrat, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">PREMIUM</text>
</svg>
