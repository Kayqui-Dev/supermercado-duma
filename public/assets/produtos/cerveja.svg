<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="25%" stop-color="#10b981"/>
      <stop offset="75%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#fdfdfd" stroke="#f1f1ee" stroke-width="2"/>
  <!-- Bottle shadow -->
  <ellipse cx="100" cy="170" rx="35" ry="8" fill="#232b28" fill-opacity="0.05"/>
  <!-- Bottle Body -->
  <path d="M92 35 L108 35 L108 42 L105 45 L105 80 L120 100 L120 162 C120 166 117 168 112 168 L88 168 C83 168 80 166 80 162 L80 100 L95 80 L95 45 L92 42 Z" fill="url(#glassGrad)" stroke="#064e3b" stroke-width="1.5"/>
  <!-- Bottle cap -->
  <path d="M91 28 L109 28 L110 35 L90 35 Z" fill="url(#capGrad)"/>
  <path d="M91 35 L109 35" stroke="#78350f" stroke-width="1"/>
  <!-- Label -->
  <path d="M81 108 L119 108 L119 138 L81 138 Z" fill="#ffffff" stroke="#047857" stroke-width="1"/>
  <circle cx="100" cy="123" r="10" fill="#047857"/>
  <!-- Red star inside label -->
  <polygon points="100,116 103,122 109,123 105,127 106,133 100,130 94,133 95,127 91,123 97,122" fill="#dc2626"/>
  <!-- Reflection/Shine on glass -->
  <path d="M85 105 L85 158" fill="none" stroke="#fff" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  <path d="M102 48 L102 75" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
</svg>
