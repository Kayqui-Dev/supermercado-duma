<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="wineGlassGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="35%" stop-color="#311042"/>
      <stop offset="70%" stop-color="#1c0721"/>
      <stop offset="100%" stop-color="#0b020c"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf5"/>
      <stop offset="100%" stop-color="#ebdcb9"/>
    </linearGradient>
    <linearGradient id="foilGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="50%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#fdfdfd" stroke="#f1f1ee" stroke-width="2"/>
  <!-- Bottle shadow -->
  <ellipse cx="100" cy="172" rx="30" ry="6" fill="#232b28" fill-opacity="0.05"/>
  <!-- Wine Bottle Body -->
  <path d="M93 25 L107 25 L107 65 L118 92 L118 165 C118 168 115 170 111 170 L89 170 C85 170 82 168 82 165 L82 92 L93 65 Z" fill="url(#wineGlassGrad)" stroke="#1c0721" stroke-width="1.5"/>
  <!-- Foil Capsule on Neck -->
  <path d="M93 25 L107 25 L107 48 L93 48 Z" fill="url(#foilGrad)"/>
  <!-- Premium Label -->
  <path d="M83 98 L117 98 L117 138 L83 138 Z" fill="url(#labelGrad)" stroke="#d97706" stroke-width="0.75"/>
  <rect x="87" y="102" width="26" height="32" fill="none" stroke="#7f1d1d" stroke-width="0.5"/>
  <text x="100" y="115" fill="#7f1d1d" font-family="Montserrat, sans-serif" font-size="8" font-weight="bold" text-anchor="middle">RESERVADO</text>
  <line x1="90" y1="120" x2="110" y2="120" stroke="#7f1d1d" stroke-width="0.5"/>
  <text x="100" y="128" fill="#232b28" font-family="Inter, sans-serif" font-size="5" text-anchor="middle">CABERNET</text>
  <!-- Glass reflection shine -->
  <path d="M86 92 L86 160" fill="none" stroke="#fff" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
</svg>
