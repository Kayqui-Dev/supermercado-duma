<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bananaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="60%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4d7c0f"/>
      <stop offset="100%" stop-color="#1e3a1e"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#fdfdfd" stroke="#f1f1ee" stroke-width="2"/>
  <!-- Bunch of Bananas Shadow -->
  <ellipse cx="100" cy="135" rx="60" ry="15" fill="#232b28" fill-opacity="0.05"/>
  <!-- Stem -->
  <path d="M102 52 C98 50 82 58 80 65 C85 66 98 62 102 52 Z" fill="url(#stemGrad)" stroke="#1e3a1e" stroke-width="1"/>
  <!-- Banana 1 (Back) -->
  <path d="M80 65 C55 85 50 115 75 135 C70 120 70 95 82 78 Z" fill="#eab308" opacity="0.8"/>
  <!-- Banana 2 (Middle) -->
  <path d="M80 65 C70 90 75 125 105 138 C100 120 90 95 82 72 Z" fill="url(#bananaGrad)" stroke="#ca8a04" stroke-width="0.5"/>
  <path d="M82 72 C77 92 82 118 103 133" fill="none" stroke="#a16207" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Banana 3 (Front right) -->
  <path d="M82 65 C95 80 125 98 135 122 C125 110 100 95 82 70 Z" fill="url(#bananaGrad)" stroke="#ca8a04" stroke-width="0.5"/>
  <path d="M82 70 C95 84 116 100 125 117" fill="none" stroke="#a16207" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Banana 4 (Left) -->
  <path d="M80 65 C40 85 45 115 68 130 C58 115 55 95 78 70 Z" fill="url(#bananaGrad)" stroke="#ca8a04" stroke-width="0.5"/>
  <path d="M78 70 C60 90 60 110 66 125" fill="none" stroke="#a16207" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Tips (brown ends) -->
  <circle cx="70" cy="133" r="3" fill="#451a03"/>
  <circle cx="106" cy="137" r="3.5" fill="#451a03"/>
  <circle cx="134" cy="122" r="3" fill="#451a03"/>
</svg>
