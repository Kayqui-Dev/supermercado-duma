<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="tomatGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="70%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#800000"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#fdfdfd" stroke="#f1f1ee" stroke-width="2"/>
  <!-- Tomato body -->
  <ellipse cx="100" cy="110" rx="65" ry="55" fill="url(#tomatGrad)" stroke="#aa0000" stroke-width="1"/>
  <!-- Highlight / Shine -->
  <ellipse cx="75" cy="85" rx="15" ry="8" transform="rotate(-15, 75, 85)" fill="#ffffff" fill-opacity="0.6"/>
  <!-- Stem & Leaves -->
  <path d="M100 55 C95 40 90 45 92 35 C94 30 102 30 104 35 C102 45 101 40 100 55 Z" fill="url(#leafGrad)"/>
  <!-- Leaves branching out -->
  <path d="M100 55 C80 50 65 65 65 65 C65 65 80 58 100 55 Z" fill="url(#leafGrad)"/>
  <path d="M100 55 C120 50 135 65 135 65 C135 65 120 58 100 55 Z" fill="url(#leafGrad)"/>
  <path d="M100 55 C90 65 85 80 85 80 C85 80 95 70 100 55 Z" fill="url(#leafGrad)"/>
  <path d="M100 55 C110 65 115 80 115 80 C115 80 105 70 100 55 Z" fill="url(#leafGrad)"/>
  <circle cx="100" cy="54" r="4" fill="#15803d"/>
</svg>
