<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="cakeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="fudgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#451a03"/>
      <stop offset="100%" stop-color="#1c0a00"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#fdfdfd" stroke="#f1f1ee" stroke-width="2"/>
  <!-- Slice shadow -->
  <polygon points="40,135 155,145 140,110" fill="#232b28" fill-opacity="0.05"/>
  <!-- Cake Sponge Base (Side view of a slice) -->
  <polygon points="50,130 150,140 140,95 50,85" fill="url(#cakeGrad)" stroke="#c2410c" stroke-width="1"/>
  <!-- Chocolate Frosting Top -->
  <polygon points="50,85 140,95 155,75 75,65" fill="url(#fudgeGrad)"/>
  <!-- Chocolate Frosting Back Edge -->
  <polygon points="140,95 150,140 155,120 155,75" fill="#321302"/>
  <!-- Chocolate Drips on the side -->
  <path d="M50 85 C55 85 58 98 62 98 C65 98 66 90 70 90 C75 90 78 105 82 105 C85 105 88 92 92 92 C98 92 102 110 106 110 C110 110 112 95 118 95 C122 95 125 102 128 102 C132 102 135 96 140 95 L140 90 L50 80 Z" fill="url(#fudgeGrad)"/>
  <!-- Shine on chocolate -->
  <path d="M78 68 Q110 75 142 82" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
</svg>
